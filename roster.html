<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster Admin | Valkyrie TM</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Barlow', sans-serif; background: #0F172A; color: #E2E8F0; min-height: 100vh; }
nav { display:flex; align-items:center; justify-content:space-between; padding:0 32px; height:68px; background:#0A0A0A; border-bottom:1px solid rgba(242,101,34,0.2); flex-wrap:wrap; gap:10px; }
.nav-left { display:flex; align-items:center; gap:16px; }
.nav-logo { height:36px; object-fit:contain; }
.nav-title { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; text-transform:uppercase; color:#F26522; }
.nav-right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.nav-user { font-size:13px; color:rgba(255,255,255,0.4); }
.sync { font-size:12px; padding:4px 10px; border-radius:20px; font-weight:600; }
.sync-ok { background:rgba(34,197,94,0.15); color:#22C55E; border:1px solid rgba(34,197,94,0.3); }
.sync-saving { background:rgba(242,101,34,0.15); color:#F26522; border:1px solid rgba(242,101,34,0.3); }
.sync-error { background:rgba(239,68,68,0.15); color:#EF4444; border:1px solid rgba(239,68,68,0.3); }
.btn { background:none; border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.5); padding:7px 14px; border-radius:3px; font-size:12px; cursor:pointer; font-family:'Barlow',sans-serif; transition:all 0.2s; text-decoration:none; display:inline-block; }
.btn:hover { border-color:#F26522; color:#F26522; }
.btn-add { background:#F26522; color:#fff; border-color:#F26522; font-weight:700; }
.btn-add:hover { background:#D4541A; border-color:#D4541A; color:#fff; }
.main { padding:28px 32px; }
.top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.page-title { font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:900; text-transform:uppercase; }
.week-nav { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.week-label { font-size:14px; font-weight:600; color:rgba(255,255,255,0.6); min-width:160px; text-align:center; }
.legend { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:7px; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700; border:1.5px solid; }
.roster-wrap { overflow-x:auto; }
.roster-table { width:100%; border-collapse:collapse; background:#0F172A; border-radius:8px; overflow:hidden; border:1px solid #1E293B; min-width:700px; }
.roster-table th { background:#1E293B; padding:12px 10px; text-align:center; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#64748B; }
.roster-table th:first-child { text-align:left; padding-left:20px; width:210px; }
.roster-table td { border-top:1px solid #1E293B; padding:10px 6px; text-align:center; }
.roster-table td:first-child { padding-left:20px; text-align:left; }
.roster-table tr:hover td { background:rgba(255,255,255,0.02); }
.emp-info { display:flex; align-items:center; gap:10px; }
.emp-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; flex-shrink:0; }
.emp-name { font-size:13px; font-weight:600; }
.emp-role { font-size:11px; color:#64748B; }
.emp-hours { font-size:11px; color:#F26522; }
.pill { padding:5px 8px; border-radius:6px; font-size:11px; font-weight:700; border:1.5px solid; cursor:pointer; display:inline-block; transition:all 0.15s; white-space:nowrap; min-width:80px; }
.pill:hover { transform:scale(0.95); filter:brightness(1.1); }
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:#1E293B; border-radius:12px; padding:28px; min-width:280px; border:1px solid #334155; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
.modal h3 { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; text-transform:uppercase; margin-bottom:6px; }
.modal-sub { font-size:13px; color:#64748B; margin-bottom:20px; }
.shift-opt { padding:12px 16px; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:all 0.15s; margin-bottom:8px; font-family:'Barlow',sans-serif; width:100%; text-align:left; }
.shift-opt:hover { transform:scale(1.01); }
.cancel-btn { background:#334155; color:#94A3B8; border:none; padding:10px; width:100%; border-radius:6px; cursor:pointer; font-family:'Barlow',sans-serif; font-size:14px; font-weight:600; margin-top:4px; }
.cancel-btn:hover { background:#475569; }
.fg { margin-bottom:14px; }
.fg label { font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#64748B; display:block; margin-bottom:6px; }
.fg input, .fg select { width:100%; background:#0F172A; border:1px solid #334155; color:#E2E8F0; padding:11px 14px; border-radius:6px; font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
.fg input:focus, .fg select:focus { border-color:#F26522; }
.fg select option { background:#1E293B; }
.toast { position:fixed; top:20px; right:20px; color:#fff; padding:12px 20px; border-radius:8px; font-weight:700; font-size:14px; z-index:999; display:none; }
.rm-btn { background:none; border:none; color:#475569; cursor:pointer; font-size:16px; padding:2px 6px; transition:color 0.2s; }
.rm-btn:hover { color:#EF4444; }
.empty { text-align:center; padding:60px; color:#64748B; font-size:15px; }
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="modal-bg" id="shiftModal" onclick="closeShiftModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Assign Shift</h3>
    <div class="modal-sub" id="modalSub"></div>
    <div id="shiftOpts"></div>
    <button class="cancel-btn" onclick="closeShiftModal()">Cancel</button>
  </div>
</div>

<div class="modal-bg" id="addModal" onclick="closeAddModal()">
  <div class="modal" onclick="event.stopPropagation()" style="min-width:320px">
    <h3>Add Employee</h3>
    <div style="height:12px"></div>
    <div class="fg"><label>Full Name</label><input id="newName" placeholder="e.g. Jamie Smith"></div>
    <div class="fg"><label>Role</label>
      <select id="newRole">
        <option>Traffic Controller</option><option>Team Leader</option>
        <option>Supervisor</option><option>Manager</option>
        <option>Operations</option><option>Admin</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button onclick="closeAddModal()" style="flex:1;padding:10px;background:#334155;color:#94A3B8;border:none;border-radius:6px;cursor:pointer;font-family:Barlow,sans-serif;font-weight:600">Cancel</button>
      <button onclick="addEmployee()" style="flex:2;padding:10px;background:#F26522;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:Barlow,sans-serif;font-weight:700">Add Employee</button>
    </div>
  </div>
</div>

<script>
var SURL = 'https://sapvbnvxsuelnossjfee.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhcHZibnZ4c3VlbG5vc3NqZmVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjU0NTQsImV4cCI6MjA5NDIwMTQ1NH0.iPSbdvCYV8oKaVY1MQy5fSKsZLHXPsTx-xGKT3VIaK0';
var sb = supabase.createClient(SURL, SKEY);

var SHIFTS = [
  {id:'morning',   label:'Morning',   time:'6:00-14:00',  color:'#F59E0B', bg:'rgba(245,158,11,0.12)',  border:'#F59E0B'},
  {id:'afternoon', label:'Afternoon', time:'14:00-22:00', color:'#3B82F6', bg:'rgba(59,130,246,0.12)',  border:'#3B82F6'},
  {id:'night',     label:'Night',     time:'22:00-6:00',  color:'#8B5CF6', bg:'rgba(139,92,246,0.12)', border:'#8B5CF6'},
  {id:'off',       label:'Day Off',   time:'-',           color:'#6B7280', bg:'rgba(107,114,128,0.1)',  border:'rgba(107,114,128,0.3)'}
];
var DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var COLORS = ['#EF4444','#F97316','#EAB308','#22C55E','#14B8A6','#3B82F6','#8B5CF6','#EC4899','#F26522','#06B6D4'];

var weekOffset = 0;
var selectedCell = null;
var employees = [];
var roster = {};

var user = JSON.parse(sessionStorage.getItem('vtm_user') || 'null');
if (!user || user.role !== 'admin') { window.location.href = 'login.html'; }
document.getElementById('navUser').textContent = user.name;

function getWeekStart() {
  var today = new Date();
  var monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay()+6)%7) + weekOffset*7);
  return monday.toISOString().split('T')[0];
}

function getWeekDates() {
  var today = new Date();
  var monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay()+6)%7) + weekOffset*7);
  return DAYS.map(function(d,i) {
    var date = new Date(monday);
    date.setDate(monday.getDate() + i);
    return {day:d, date:date.getDate(), month:date.toLocaleString('default',{month:'short'}), full:date};
  });
}

function shiftById(id) {
  return SHIFTS.find(function(s){ return s.id === id; }) || SHIFTS[3];
}

function getShift(empId, day) {
  return shiftById(roster[empId + '_' + day]);
}

function getHours(empId) {
  return DAYS.filter(function(d){ return getShift(empId,d).id !== 'off'; }).length * 8;
}

function setSyncStatus(status) {
  var el = document.getElementById('syncEl');
  el.className = 'sync';
  if (status === 'saving') { el.classList.add('sync-saving'); el.textContent = 'Saving...'; }
  else if (status === 'ok') { el.classList.add('sync-ok'); el.innerHTML = '&#9679; Live'; }
  else { el.classList.add('sync-error'); el.textContent = 'Error'; }
}

function showToast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#EF4444' : '#22C55E';
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2500);
}

async function loadData() {
  setSyncStatus('saving');
  var weekStart = getWeekStart();
  var empRes = await sb.from('employees').select('*').order('id');
  if (empRes.error) { setSyncStatus('error'); showToast('Could not load employees', true); return; }
  employees = empRes.data.map(function(e,i){ return Object.assign({}, e, {color: e.color || COLORS[i % COLORS.length]}); });
  var shiftRes = await sb.from('roster_shifts').select('*').eq('week_start', weekStart);
  if (shiftRes.error) { setSyncStatus('error'); showToast('Could not load shifts', true); return; }
  roster = {};
  shiftRes.data.forEach(function(s){ roster[s.employee_id + '_' + s.day] = s.shift_type; });
  setSyncStatus('ok');
  render();
}

async function saveShift(empId, day, shiftType) {
  setSyncStatus('saving');
  var weekStart = getWeekStart();
  var res = await sb.from('roster_shifts').upsert(
    {employee_id: empId, week_start: weekStart, day: day, shift_type: shiftType, updated_at: new Date().toISOString()},
    {onConflict: 'employee_id,week_start,day'}
  );
  if (res.error) { setSyncStatus('error'); showToast('Save failed', true); return false; }
  roster[empId + '_' + day] = shiftType;
  setSyncStatus('ok');
  return true;
}

function render() {
  var dates = getWeekDates();
  var today = new Date();
  document.getElementById('weekLabel').textContent = dates[0].month + ' ' + dates[0].date + ' - ' + dates[6].month + ' ' + dates[6].date;

  var leg = '';
  SHIFTS.forEach(function(s) {
    var count = 0;
    employees.forEach(function(e){ DAYS.forEach(function(d){ if(getShift(e.id,d).id===s.id) count++; }); });
    leg += '<div class="legend-item" style="color:'+s.color+';background:'+s.bg+';border-color:'+s.border+'"><div style="width:8px;height:8px;border-radius:50%;background:'+s.color+'"></div>'+s.label+' <span style="opacity:0.6">('+count+')</span></div>';
  });
  document.getElementById('legend').innerHTML = leg;

  var head = '<tr><th>Employee</th>';
  dates.forEach(function(d) {
    var isToday = d.full.toDateString() === today.toDateString();
    head += '<th><div style="font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:800;color:'+(isToday?'#F26522':'#E2E8F0')+'">'+d.date+'</div><div style="font-size:10px;color:#475569">'+d.day+' '+d.month+'</div></th>';
  });
  head += '<th></th></tr>';
  document.getElementById('tHead').innerHTML = head;

  var body = '';
  if (employees.length === 0) {
    body = '<tr><td colspan="9" class="empty">No employees yet — click + Add Staff to get started</td></tr>';
  } else {
    employees.forEach(function(emp) {
      var hours = getHours(emp.id);
      var initials = emp.name.split(' ').map(function(n){ return n[0]; }).join('');
      body += '<tr><td><div class="emp-info"><div class="emp-avatar" style="background:'+emp.color+'">'+initials+'</div><div><div class="emp-name">'+emp.name+'</div><div class="emp-role">'+emp.role+'</div><div class="emp-hours">'+hours+'h/wk</div></div></div></td>';
      DAYS.forEach(function(day) {
        var shift = getShift(emp.id, day);
        body += '<td><span class="pill" style="color:'+shift.color+';background:'+shift.bg+';border-color:'+shift.border+'" onclick="openShiftModal('+emp.id+',''+day+'')">'+shift.label+'<br><span style="font-weight:400;font-size:10px">'+shift.time+'</span></span></td>';
      });
      body += '<td><button class="rm-btn" onclick="removeEmp('+emp.id+')">&#10005;</button></td></tr>';
    });
  }
  document.getElementById('tBody').innerHTML = body;
}

function openShiftModal(empId, day) {
  selectedCell = {empId: empId, day: day};
  var emp = employees.find(function(e){ return e.id === empId; });
  document.getElementById('modalSub').textContent = emp.name + ' - ' + day;
  var opts = '';
  SHIFTS.forEach(function(s) {
    opts += '<button class="shift-opt" style="background:'+s.bg+';border-color:'+s.border+';color:'+s.color+'" onclick="assignShift(''+s.id+'')"><div style="font-weight:700;font-size:14px">'+s.label+'</div><div style="font-size:12px;opacity:0.75">'+s.time+'</div></button>';
  });
  document.getElementById('shiftOpts').innerHTML = opts;
  document.getElementById('shiftModal').classList.add('open');
}

async function assignShift(shiftId) {
  if (!selectedCell) return;
  var empId = selectedCell.empId;
  var day = selectedCell.day;
  closeShiftModal();
  var ok = await saveShift(empId, day, shiftId);
  if (ok) { render(); showToast('Shift saved!'); }
}

function closeShiftModal() { document.getElementById('shiftModal').classList.remove('open'); selectedCell = null; }
function openAddModal() { document.getElementById('addModal').classList.add('open'); }
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

async function addEmployee() {
  var name = document.getElementById('newName').value.trim();
  if (!name) return;
  var role = document.getElementById('newRole').value;
  var color = COLORS[employees.length % COLORS.length];
  setSyncStatus('saving');
  var res = await sb.from('employees').insert({name: name, role: role, color: color}).select().single();
  if (res.error) { setSyncStatus('error'); showToast('Could not add employee', true); return; }
  employees.push(res.data);
  document.getElementById('newName').value = '';
  closeAddModal();
  setSyncStatus('ok');
  render();
  showToast(name + ' added!');
}

async function removeEmp(id) {
  if (!confirm('Remove this employee from the roster?')) return;
  setSyncStatus('saving');
  var res = await sb.from('employees').delete().eq('id', id);
  if (res.error) { setSyncStatus('error'); showToast('Could not remove', true); return; }
  employees = employees.filter(function(e){ return e.id !== id; });
  DAYS.forEach(function(d){ delete roster[id + '_' + d]; });
  setSyncStatus('ok');
  render();
  showToast('Employee removed');
}

function prevWeek() { weekOffset--; loadData(); }
function nextWeek() { weekOffset++; loadData(); }
function thisWeek() { weekOffset = 0; loadData(); }
function doLogout() { sessionStorage.removeItem('vtm_user'); window.location.href = 'login.html'; }

loadData();
</script>
