<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Portal | Valkyrie Traffic Management</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Barlow', sans-serif; background: #0A0A0A; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .bg-grid { position: fixed; inset: 0; opacity: 0.03; background-image: linear-gradient(rgba(242,101,34,1) 1px, transparent 1px), linear-gradient(90deg, rgba(242,101,34,1) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
  .bg-glow { position: fixed; top: -200px; right: -200px; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(242,101,34,0.08) 0%, transparent 70%); pointer-events: none; }
  .login-box { position: relative; z-index: 2; width: 100%; max-width: 420px; padding: 20px; }
  .logo-wrap { text-align: center; margin-bottom: 40px; }
  .logo-wrap img { height: 60px; object-fit: contain; }
  .portal-label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #F26522; margin-top: 12px; }
  .card { background: #1A1A1A; border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; padding: 40px; }
  .card h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; }
  .card p { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 32px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.35); display: block; margin-bottom: 8px; }
  .form-group input { width: 100%; background: #111; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px 16px; border-radius: 3px; font-family: 'Barlow', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: #F26522; }
  .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; padding: 12px 16px; border-radius: 3px; font-size: 13px; margin-bottom: 18px; display: none; }
  .btn-login { width: 100%; background: #F26522; color: #fff; padding: 16px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border: none; cursor: pointer; border-radius: 3px; transition: all 0.2s; margin-top: 8px; }
  .btn-login:hover { background: #D4541A; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(242,101,34,0.3); }
  .back-link { text-align: center; margin-top: 24px; }
  .back-link a { font-size: 13px; color: rgba(255,255,255,0.3); text-decoration: none; transition: color 0.2s; }
  .back-link a:hover { color: #F26522; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
