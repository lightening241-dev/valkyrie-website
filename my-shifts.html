<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shifts | Valkyrie TM</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Barlow',sans-serif; background:#0A0A0A; color:#fff; min-height:100vh; }
nav { display:flex; align-items:center; justify-content:space-between; padding:0 5%; height:68px; background:#111; border-bottom:1px solid rgba(242,101,34,0.2); flex-wrap:wrap; gap:10px; }
.nav-logo { height:38px; object-fit:contain; }
.nav-right { display:flex; align-items:center; gap:16px; }
.nav-user { font-size:13px; color:rgba(255,255,255,0.5); }
.nav-user span { color:#F26522; font-weight:600; }
.btn-logout { background:none; border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.5); padding:7px 14px; border-radius:3px; font-size:12px; cursor:pointer; font-family:'Barlow',sans-serif; transition:all 0.2s; }
.btn-logout:hover { border-color:#F26522; color:#F26522; }
.main { padding:36px 5%; max-width:960px; margin:0 auto; }
.page-title { font-family:'Barlow Condensed',sans-serif; font-size:40px; font-weight:900; text-transform:uppercase; margin-bottom:6px; }
.page-sub { font-size:14px; color:rgba(255,255,255,0.4); margin-bottom:32px; }
.week-nav { display:flex; align-items:center; gap:12px; margin-bottom:28px; flex-wrap:wrap; }
.week-label { font-size:15px; font-weight:600; color:rgba(255,255,255,0.7); min-width:180px; text-align:center; }
.btn-week { background:#1A1A1A; border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.6); padding:8px 16px; border-radius:3px; cursor:pointer; font-family:'Barlow',sans-serif; font-size:13px; transition:all 0.2s; }
.btn-week:hover { border-color:#F26522; color:#F26522; }
.shifts-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; margin-bottom:36px; }
.shift-card { background:#1A1A1A; border:1.5px solid rgba(255,255,255,0.06); border-radius:8px; padding:14px 10px; text-align:center; transition:border-color 0.2s; }
.shift-card.today { border-color:#F26522; }
.day-name { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:4px; }
.day-date { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:800; margin-bottom:10px; }
.shift-time { font-size:13px; font-weight:700; margin-bottom:6px; }
.shift-dur { font-size:11px; opacity:0.6; margin-bottom:10px; }
.status-pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; border:1px solid; margin-bottom:10px; letter-spacing:0.04em; text-transform:uppercase; }
.s-pending { color:#F59E0B; background:rgba(245,158,11,0.1); border-color:rgba(245,158,11,0.4); }
.s-accepted { color:#22C55E; background:rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.4); }
.s-declined { color:#EF4444; background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.4); }
.s-cancelled { color:#9CA3AF; background:rgba(156,163,175,0.06); border-color:rgba(156,163,175,0.25); }
.s-off { color:#4B5563; background:rgba(75,85,99,0.06); border-color:rgba(75,85,99,0.2); }
.card-actions { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
.card-btn { padding:7px 6px; border-radius:5px; font-family:'Barlow',sans-serif; font-size:11px; font-weight:700; border:none; cursor:pointer; transition:all 0.2s; }
.btn-accept { background:rgba(34,197,94,0.15); color:#22C55E; border:1px solid rgba(34,197,94,0.3); }
.btn-accept:hover { background:rgba(34,197,94,0.25); }
.btn-decline { background:rgba(239,68,68,0.1); color:#EF4444; border:1px solid rgba(239,68,68,0.25); }
.btn-decline:hover { background:rgba(239,68,68,0.2); }
.btn-cancel-shift { background:rgba(156,163,175,0.1); color:#9CA3AF; border:1px solid rgba(156,163,175,0.2); }
.btn-cancel-shift:hover { background:rgba(156,163,175,0.2); }
.reason-note { font-size:10px; font-style:italic; color:rgba(255,255,255,0.35); margin-top:4px; }
.summary-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.summary-card { background:#1A1A1A; border:1px solid rgba(255,255,255,0.06); border-radius:6px; padding:22px; }
.summary-num { font-family:'Barlow Condensed',sans-serif; font-size:42px; font-weight:900; color:#F26522; line-height:1; }
.summary-label { font-size:12px; color:rgba(255,255,255,0.4); font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-top:4px; }
.empty { text-align:center; padding:40px; color:rgba(255,255,255,0.3); font-size:15px; }
.shift-note { font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:8px; line-height:1.5; text-align:left; background:rgba(242,101,34,0.06); border-radius:4px; padding:6px 8px; }
.attach-link { display:block; font-size:11px; color:#F26522; text-decoration:none; margin-bottom:8px; padding:5px 8px; background:rgba(242,101,34,0.08); border-radius:4px; border:1px solid rgba(242,101,34,0.2); }
.attach-link:hover { background:rgba(242,101,34,0.18); }
/* MODAL */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-bg.open { display:flex; }
.modal { background:#1A1A1A; border-radius:12px; padding:28px; width:100%; max-width:380px; border:1px solid #2A2A2A; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
.modal h3 { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; text-transform:uppercase; margin-bottom:6px; }
.modal-sub { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:20px; }
.fg label { font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:rgba(255,255,255,0.4); display:block; margin-bottom:6px; }
.fg textarea { width:100%; background:#0A0A0A; border:1.5px solid rgba(255,255,255,0.1); color:#fff; padding:11px 14px; border-radius:6px; font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; min-height:90px; resize:vertical; }
.fg textarea:focus { border-color:#F26522; }
.mactions { display:flex; gap:10px; margin-top:16px; }
.mactions button { flex:1; padding:11px; border-radius:6px; cursor:pointer; font-family:'Barlow',sans-serif; font-size:13px; font-weight:700; border:none; transition:all 0.2s; }
.mbtn-back { background:#334155; color:#94A3B8; }
.mbtn-confirm { background:#EF4444; color:#fff; }
.mbtn-confirm:hover { background:#DC2626; }
.toast { position:fixed; top:20px; right:20px; color:#fff; padding:12px 20px; border-radius:8px; font-weight:700; font-size:14px; z-index:999; display:none; }
@media(max-width:600px) { .shifts-grid{grid-template-columns:1fr 1fr;} .summary-cards{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- CANCEL REASON MODAL -->
<div class="modal-bg" id="cancelModal" onclick="closeCancelModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Cancel Shift</h3>
    <div class="modal-sub" id="cancelModalSub"></div>
    <div class="fg">
      <label>Reason for cancellation</label>
      <textarea id="cancelReason" placeholder="Please provide a reason..."></textarea>
    </div>
    <div class="mactions">
      <button class="mbtn-back" onclick="closeCancelModal()">Go Back</button>
      <button class="mbtn-confirm" onclick="confirmCancel()">Cancel Shift</button>
    </div>
  </div>
</div>

<nav>
  <img src="favicon.png" alt="Valkyrie TM" class="nav-logo">
  <div class="nav-right">
    <div class="nav-user">Signed in as <span id="navName"></span></div>
    <button class="btn-logout" onclick="doLogout()">Sign Out</button>
  </div>
</nav>

<div class="main">
  <div class="page-title">My Shifts</div>
  <div class="page-sub" id="weekRange">Loading your schedule...</div>
  <div class="week-nav">
    <button class="btn-week" onclick="prevWeek()">â† Previous</button>
    <div class="week-label" id="weekLabel"></div>
    <button class="btn-week" onclick="nextWeek()">Next â†’</button>
    <button class="btn-week" onclick="thisWeek()">Today</button>
  </div>
  <div class="shifts-grid" id="shiftsGrid"><div style="grid-column:span 7" class="empty">Loading shifts...</div></div>
  <div class="summary-cards" id="summaryCards"></div>
</div>

<script>
var SURL='https://sapvbnvxsuelnossjfee.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhcHZibnZ4c3VlbG5vc3NqZmVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjU0NTQsImV4cCI6MjA5NDIwMTQ1NH0.iPSbdvCYV8oKaVY1MQy5fSKsZLHXPsTx-xGKT3VIaK0';
var sb=supabase.createClient(SURL,SKEY);

var EJS_PUBLIC_KEY='nMUGEEgvVgFt5AccJ';
var EJS_SERVICE_ID='service_b1x65cd';
var EJS_TEMPLATE_ADMIN='template_vkyf122';
var ADMIN_EMAIL='ammar@valkyrietm.com.au';
var EMAIL_ENABLED=true;

var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var weekOffset=0;
var myEmpId=null;
var myShifts={};
var cancelTarget=null;

var user=JSON.parse(sessionStorage.getItem('vtm_user')||'null');
if (!user) window.location.href='login.html';
document.getElementById('navName').textContent=user?user.name:'';

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeToMins(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function calcDur(s,e){var sm=timeToMins(s),em=timeToMins(e),diff=em>sm?em-sm:1440-sm+em;return Math.floor(diff/60)+'h'+(diff%60>0?' '+diff%60+'m':'');}

function getWeekStart(){
  var today=new Date(),d=new Date(today);
  d.setDate(today.getDate()-((today.getDay()+6)%7)+weekOffset*7);
  return d.toISOString().split('T')[0];
}
function getWeekDates(){
  var today=new Date(),monday=new Date(today);
  monday.setDate(today.getDate()-((today.getDay()+6)%7)+weekOffset*7);
  var r=[];
  for(var i=0;i<7;i++){var d=new Date(monday);d.setDate(monday.getDate()+i);r.push({day:DAYS[i],date:d.getDate(),month:d.toLocaleString('default',{month:'short'}),full:d});}
  return r;
}

function showToast(msg,isErr){
  var t=document.getElementById('toast');t.textContent=msg;
  t.style.background=isErr?'#EF4444':'#22C55E';t.style.display='block';
  setTimeout(function(){t.style.display='none';},3000);
}

async function sendAdminEmail(action, day, shiftTime, reason) {
  if (!EMAIL_ENABLED) return;
  try {
    emailjs.send(EJS_SERVICE_ID, EJS_TEMPLATE_ADMIN, {
      to_email: ADMIN_EMAIL,
      worker_name: user.name,
      action: action,
      shift_day: day,
      shift_time: shiftTime,
      reason: reason || 'No reason provided',
      week_start: getWeekStart()
    });
  } catch(e) { console.warn('Email failed:', e); }
}

async function loadShifts(){
  var dates=getWeekDates(), today=new Date(), weekStart=getWeekStart();
  document.getElementById('weekLabel').textContent=dates[0].month+' '+dates[0].date+' - '+dates[6].month+' '+dates[6].date;
  document.getElementById('weekRange').textContent='Your schedule for the week of '+dates[0].month+' '+dates[0].date;

  var empRes=await sb.from('employees').select('id,name').eq('name',user.name).single();
  if (empRes.error||!empRes.data){
    document.getElementById('shiftsGrid').innerHTML='<div style="grid-column:span 7" class="empty">No schedule found. Contact your admin.</div>';
    return;
  }
  myEmpId=empRes.data.id;

  var shiftRes=await sb.from('roster_shifts').select('*').eq('employee_id',myEmpId).eq('week_start',weekStart);
  myShifts={};
  (shiftRes.data||[]).forEach(function(s){myShifts[s.day]=s;});

  var html='', totalMins=0, workDays=0, pending=0;
  dates.forEach(function(d){
    var s=myShifts[d.day];
    var isToday=d.full.toDateString()===today.toDateString();
    var cardClass='shift-card'+(isToday?' today':'');
    html+='<div class="'+cardClass+'"><div class="day-name">'+d.day+'</div><div class="day-date">'+d.date+'</div>';

    if (!s||!s.shift_type||s.shift_type==='off'){
      html+='<span class="status-pill s-off">Day Off</span>';
    } else {
      var st=s.status||'pending';
      var pts=s.shift_type.split('-');
      var dur=pts.length===2?calcDur(pts[0],pts[1]):'';
      if (st!=='off'){var sm=timeToMins(pts[0]),em=timeToMins(pts[1]),diff=em>sm?em-sm:1440-sm+em;totalMins+=diff;workDays++;}
      if (st==='pending') pending++;
      html+='<div class="shift-time">'+s.shift_type+'</div>';
      if (dur) html+='<div class="shift-dur">'+dur+'</div>';
      html+='<span class="status-pill s-'+st+'">'+st.charAt(0).toUpperCase()+st.slice(1)+'</span>';
      if (s.cancel_reason) html+='<div class="reason-note">Reason: '+s.cancel_reason+'</div>';
      if (s.notes) html+='<div class="shift-note">'+escHtml(s.notes)+'</div>';
      if (s.attachment_url) html+='<a class="attach-link" href="'+s.attachment_url+'" target="_blank">ðŸ“Ž '+(s.attachment_name||'View attachment')+'</a>';
      html+='<div class="card-actions">';
      if (st==='pending'){
        html+='<button class="card-btn btn-accept" onclick="acceptShift(\''+d.day+'\')">Accept</button>';
        html+='<button class="card-btn btn-decline" onclick="declineShift(\''+d.day+'\')">Decline</button>';
      }
      if (st==='accepted'){
        html+='<button class="card-btn btn-cancel-shift" onclick="openCancelModal(\''+d.day+'\',\''+s.shift_type+'\')">Cancel Shift</button>';
      }
      html+='</div>';
    }
    html+='</div>';
  });
  document.getElementById('shiftsGrid').innerHTML=html;

  var hrs=Math.round(totalMins/60*10)/10;
  document.getElementById('summaryCards').innerHTML=
    '<div class="summary-card"><div class="summary-num">'+hrs+'h</div><div class="summary-label">Hours This Week</div></div>'+
    '<div class="summary-card"><div class="summary-num">'+workDays+'</div><div class="summary-label">Days Working</div></div>'+
    '<div class="summary-card"><div class="summary-num">'+pending+'</div><div class="summary-label">Awaiting Response</div></div>';
}

async function acceptShift(day){
  var res=await sb.from('roster_shifts').update({status:'accepted',updated_at:new Date().toISOString()})
    .eq('employee_id',myEmpId).eq('week_start',getWeekStart()).eq('day',day);
  if (res.error){showToast('Error: '+res.error.message,true);return;}
  var s=myShifts[day];
  sendAdminEmail('ACCEPTED', day, s?s.shift_type:'', '');
  showToast('Shift accepted!');
  loadShifts();
}

async function declineShift(day){
  var res=await sb.from('roster_shifts').update({status:'declined',updated_at:new Date().toISOString()})
    .eq('employee_id',myEmpId).eq('week_start',getWeekStart()).eq('day',day);
  if (res.error){showToast('Error: '+res.error.message,true);return;}
  var s=myShifts[day];
  sendAdminEmail('DECLINED', day, s?s.shift_type:'', '');
  showToast('Shift declined.');
  loadShifts();
}

function openCancelModal(day, shiftTime){
  cancelTarget={day:day,shiftTime:shiftTime};
  document.getElementById('cancelModalSub').textContent=day+' â€” '+shiftTime;
  document.getElementById('cancelReason').value='';
  document.getElementById('cancelModal').classList.add('open');
}
function closeCancelModal(){document.getElementById('cancelModal').classList.remove('open');cancelTarget=null;}

async function confirmCancel(){
  if (!cancelTarget) return;
  var reason=document.getElementById('cancelReason').value.trim();
  if (!reason){showToast('Please provide a reason',true);return;}
  var res=await sb.from('roster_shifts').update({status:'cancelled',cancel_reason:reason,updated_at:new Date().toISOString()})
    .eq('employee_id',myEmpId).eq('week_start',getWeekStart()).eq('day',cancelTarget.day);
  if (res.error){showToast('Error: '+res.error.message,true);return;}
  sendAdminEmail('CANCELLED', cancelTarget.day, cancelTarget.shiftTime, reason);
  closeCancelModal();
  showToast('Shift cancelled. Admin notified.');
  loadShifts();
}

function prevWeek(){weekOffset--;loadShifts();}
function nextWeek(){weekOffset++;loadShifts();}
function thisWeek(){weekOffset=0;loadShifts();}
function doLogout(){sessionStorage.removeItem('vtm_user');window.location.href='login.html';}

if (EMAIL_ENABLED) emailjs.init(EJS_PUBLIC_KEY);
loadShifts();
</script>
</body>
</html>
